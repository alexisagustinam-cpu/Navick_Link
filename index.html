<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navick Design — Links</title>
  <meta name="description" content="Navick Design — Ropa deportiva de calidad. Encuéntranos en nuestras redes sociales." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Navick Design" />
  <meta property="og:description" content="Ropa deportiva · Atuntaqui, Ecuador" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-bright: #0897D4;
      --blue-sky: #78C8F0;
      --blue-navy: #07406A;
      --white: #FFFFFF;
    }
    html, body { min-height: 100%; }
    body {
      background: #000000;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -150px; left: -150px;
      width: 450px; height: 450px;
      border-radius: 50%;
      background: var(--blue-navy);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: var(--blue-bright);
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease both;
    }
    .logo-img {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }
    .tagline {
      font-size: 11px;
      color: var(--blue-sky);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      text-align: center;
    }
    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, var(--blue-bright), var(--blue-sky));
      margin: 1.25rem auto;
      position: relative; z-index: 1;
    }
    .links-container {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      gap: 10px;
      position: relative; z-index: 1;
    }
    .link-item {
      display: flex; align-items: center;
      gap: 14px; padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(120,200,240,0.2);
      text-decoration: none; color: var(--white);
      font-size: 12px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .link-item:nth-child(1){animation-delay:0.1s}
    .link-item:nth-child(2){animation-delay:0.18s}
    .link-item:nth-child(3){animation-delay:0.26s}
    .link-item:nth-child(4){animation-delay:0.34s}
    .link-item:nth-child(5){animation-delay:0.42s}
    .link-item:nth-child(6){animation-delay:0.50s}
    .link-item::before {
      content: ''; position: absolute;
      left: 0; top: 0; width: 3px; height: 100%;
      background: transparent; transition: background 0.2s;
    }
    .link-item:hover { background: rgba(8,151,212,0.15); border-color: var(--blue-bright); transform: translateX(2px); }
    .link-item:hover::before { background: var(--blue-bright); }
    .link-item:active { transform: scale(0.98); }
    .link-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-icon svg { width: 20px; height: 20px; fill: var(--blue-sky); }
    .link-icon svg.stroke-icon { fill: none; stroke: var(--blue-sky); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .link-label { flex: 1; color: #D0E8F5; }
    .link-arrow { color: rgba(120,200,240,0.35); font-size: 16px; transition: color 0.2s, transform 0.2s; }
    .link-item:hover .link-arrow { color: var(--blue-sky); transform: translateX(4px); }
    footer { margin-top: 3rem; font-size: 10px; color: rgba(120,200,240,0.3); letter-spacing: 2px; text-transform: uppercase; text-align: center; position: relative; z-index: 1; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @media (prefers-reduced-motion: reduce) { .logo-section, .link-item { animation: none; } }
    @media (max-width: 420px) { body { padding: 1.5rem 1rem 3rem; } .logo-img { width: 110px; height: 110px; } }
  </style>
</head>
